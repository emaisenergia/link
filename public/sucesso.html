<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Verificado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #141414;
      border-radius: 20px;
      border: 1px solid #222;
      max-width: 400px;
    }
    .check {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 10px; }
    p  { color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Acesso verificado</h1>
    <p>Sua identidade foi confirmada com sucesso.</p>
  </div>
</body>
</html>
